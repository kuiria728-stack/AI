<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自分でツクール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">自分でツクール</span>
      </div>
      <div class="header-right">
        <button class="btn-pro" id="proBtn" title="プロプラン">
          <span class="pro-icon">👑</span>
          <span class="pro-label">PRO</span>
        </button>
        <div class="usage-badge" id="usageBadge">
          <span id="usageCount">—</span>/<span id="usageLimit">250</span>
        </div>
      </div>
    </div>
  </header>

  <!-- メインレイアウト -->
  <main class="main">

    <!-- サイドバー：チャット -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">チャット</h2>
        <button class="btn-clear" id="clearBtn" title="会話をリセット">🗑</button>
      </div>

      <!-- システムプロンプト設定 -->
      <div class="system-area">
        <label class="system-label">ボットへの指示（システムプロンプト）</label>
        <textarea
          id="systemPrompt"
          class="system-input"
          placeholder="例：あなたは料理専門家です。レシピを日本語で丁寧に教えてください。"
          rows="3"
        ></textarea>
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="chat">💬 チャット</button>
          <button class="mode-tab" data-mode="html">🌐 HTML生成</button>
        </div>
      </div>

      <!-- メッセージ一覧 -->
      <div class="messages" id="messages">
        <div class="welcome-msg">
          <div class="welcome-icon">✨</div>
          <p>システムプロンプトで<br>ボットに指示を出して、<br>会話を始めよう！</p>
        </div>
      </div>

      <!-- 入力エリア -->
      <div class="input-area">
        <div class="input-wrap">
          <textarea
            id="userInput"
            class="user-input"
            placeholder="メッセージを入力..."
            rows="2"
          ></textarea>
          <button class="btn-send" id="sendBtn">
            <span class="send-icon">↑</span>
          </button>
        </div>
        <div class="input-footer">
          <span id="statusMsg" class="status-msg"></span>
        </div>
      </div>
    </aside>

    <!-- メインエリア：プレビュー -->
    <section class="preview-section" id="previewSection">
      <div class="preview-header">
        <h2 class="preview-title">プレビュー</h2>
        <div class="preview-actions" id="previewActions" style="display:none">
          <button class="btn-action" id="openTabBtn">🔗 新しいタブで開く</button>
          <button class="btn-action" id="downloadBtn">⬇ ダウンロード</button>
          <button class="btn-action secondary" id="copyHtmlBtn">📋 HTMLをコピー</button>
        </div>
      </div>
      <div class="preview-body" id="previewBody">
        <div class="preview-empty">
          <div class="empty-icon">🎨</div>
          <p>HTMLモードで生成すると<br>ここにプレビューが表示されます</p>
        </div>
      </div>
    </section>

  </main>

  <!-- プロプランモーダル -->
  <div class="modal-overlay" id="proModal">
    <div class="modal">
      <h3 class="modal-title">👑 プロプラン</h3>
      <p class="modal-desc">シークレットキーを入力すると、制限が緩和されます。</p>
      <ul class="modal-features">
        <li>✅ 1日1,0000回まで利用可能</li>
        <li>✅ 1分間に60回まで送信可能</li>
      </ul>
      <input type="password" id="proKeyInput" class="modal-input" placeholder="シークレットキーを入力">
      <div class="modal-buttons">
        <button class="btn-modal-primary" id="proConfirmBtn">確認</button>
        <button class="btn-modal-secondary" id="proCloseBtn">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
